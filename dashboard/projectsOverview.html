<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>All Projects</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" />
    <link rel="stylesheet" href="../css/style.css">
    <style>
        body { background-color: #f8f9fa; padding: 1rem 2rem; }
        .dash-card { background: #fff; border: 1px solid rgba(0,0,0,0.05); border-radius: 1rem; box-shadow: 0 4px 15px rgba(0,0,0,0.02); padding: 1.5rem; }
    </style>
</head>
<body>
    <div class="container-fluid p-0">
        <h2 class="fw-bold text-primary mb-4">All Active Projects</h2>
        
        <div class="row g-4">
            <!-- Project 1 -->
            <div class="col-md-6 col-xl-4">
                <div class="dash-card">
                    <div class="d-flex justify-content-between align-items-center mb-3">
                        <span class="badge bg-success bg-opacity-10 text-success rounded-pill px-3 py-2">In Progress</span>
                        <span class="text-muted small fw-bold">Due: Oct 20</span>
                    </div>
                    <h5 class="fw-bold text-dark">Front Yard Redesign</h5>
                    <p class="text-secondary small mb-3"><span class="material-symbols-outlined align-bottom" style="font-size: 1rem;">person</span> Sarah Adams</p>
                    
                    <div class="mb-3">
                        <div class="d-flex justify-content-between small fw-bold mb-1">
                            <span>Progress</span>
                            <span class="text-success">65%</span>
                        </div>
                        <div class="progress" style="height: 8px;">
                            <div class="progress-bar bg-success" role="progressbar" style="width: 65%;"></div>
                        </div>
                    </div>
                    
                    <div class="d-flex justify-content-between align-items-center mt-4 pt-3 border-top">
                        <div>
                            <p class="small text-muted mb-0">Budget</p>
                            <h6 class="fw-bold mb-0">$15,000</h6>
                        </div>
                        <button class="btn btn-sm btn-outline-secondary fw-bold rounded-pill">Manage</button>
                    </div>
                </div>
            </div>

            <!-- Project 2 -->
            <div class="col-md-6 col-xl-4">
                <div class="dash-card">
                    <div class="d-flex justify-content-between align-items-center mb-3">
                        <span class="badge bg-warning bg-opacity-10 text-warning rounded-pill px-3 py-2">Design Phase</span>
                        <span class="text-muted small fw-bold">Due: Nov 15</span>
                    </div>
                    <h5 class="fw-bold text-dark">Pool Deck Hardscaping</h5>
                    <p class="text-secondary small mb-3"><span class="material-symbols-outlined align-bottom" style="font-size: 1rem;">person</span> John Doe</p>
                    
                    <div class="mb-3">
                        <div class="d-flex justify-content-between small fw-bold mb-1">
                            <span>Progress</span>
                            <span class="text-warning">15%</span>
                        </div>
                        <div class="progress" style="height: 8px;">
                            <div class="progress-bar bg-warning" role="progressbar" style="width: 15%;"></div>
                        </div>
                    </div>
                    
                    <div class="d-flex justify-content-between align-items-center mt-4 pt-3 border-top">
                        <div>
                            <p class="small text-muted mb-0">Budget</p>
                            <h6 class="fw-bold mb-0">$32,000</h6>
                        </div>
                        <button class="btn btn-sm btn-outline-secondary fw-bold rounded-pill">Manage</button>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <script>
    document.addEventListener('DOMContentLoaded', () => {
        document.querySelectorAll('button, a.btn, .action-btn').forEach(btn => {
            btn.addEventListener('click', (e) => {
                e.preventDefault();
                window.top.location.href = '../404.html';
            });
        });
    });
</script>
</body>
</html>
