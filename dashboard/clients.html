<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Landscaper Clients</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" />
    <link rel="stylesheet" href="../css/style.css">
    <style>
        body { background-color: #f8f9fa; padding: 1rem 2rem; }
        .dash-card { background: #fff; border: 1px solid rgba(0,0,0,0.05); border-radius: 1rem; box-shadow: 0 4px 15px rgba(0,0,0,0.02); padding: 1.5rem; }
        .client-avatar { width: 50px; height: 50px; border-radius: 50%; background-color: var(--bs-primary); color: white; display: flex; align-items: center; justify-content: center; font-weight: bold; font-size: 1.2rem; }
    </style>
</head>
<body>
    <div class="container-fluid p-0">
        <h2 class="fw-bold text-primary mb-4">My Assigned Clients</h2>
        
        <div class="dash-card">
            <div class="table-responsive">
                <table class="table table-hover align-middle">
                    <thead>
                        <tr class="text-uppercase text-secondary small tracking-widest">
                            <th>Client</th>
                            <th>Property Address</th>
                            <th>Active Plan</th>
                            <th>Contact</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr>
                            <td>
                                <div class="d-flex align-items-center gap-3">
                                    <div class="client-avatar">JD</div>
                                    <div>
                                        <h6 class="fw-bold mb-0">John Doe</h6>
                                        <small class="text-muted">Client since 2021</small>
                                    </div>
                                </div>
                            </td>
                            <td>124 Maple St.<br><small class="text-muted">Gate code: 1234</small></td>
                            <td><span class="badge bg-success bg-opacity-10 text-success rounded-pill px-3">Premium Care</span></td>
                            <td>
                                <button class="btn btn-sm btn-light text-primary me-1"><span class="material-symbols-outlined align-middle" style="font-size: 1.2rem;">call</span></button>
                                <button class="btn btn-sm btn-light text-primary"><span class="material-symbols-outlined align-middle" style="font-size: 1.2rem;">mail</span></button>
                            </td>
                            <td><button class="btn btn-sm btn-outline-secondary fw-bold rounded-pill">View Property Notes</button></td>
                        </tr>
                        <tr>
                            <td>
                                <div class="d-flex align-items-center gap-3">
                                    <div class="client-avatar bg-success">SA</div>
                                    <div>
                                        <h6 class="fw-bold mb-0">Sarah Adams</h6>
                                        <small class="text-muted">Client since 2023</small>
                                    </div>
                                </div>
                            </td>
                            <td>450 West End Rd.<br><small class="text-muted">Beware of dog</small></td>
                            <td><span class="badge bg-warning bg-opacity-10 text-warning rounded-pill px-3">One-Time Project</span></td>
                            <td>
                                <button class="btn btn-sm btn-light text-primary me-1"><span class="material-symbols-outlined align-middle" style="font-size: 1.2rem;">call</span></button>
                                <button class="btn btn-sm btn-light text-primary"><span class="material-symbols-outlined align-middle" style="font-size: 1.2rem;">mail</span></button>
                            </td>
                            <td><button class="btn btn-sm btn-outline-secondary fw-bold rounded-pill">View Property Notes</button></td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
    <script>
    document.addEventListener('DOMContentLoaded', () => {
        document.querySelectorAll('button, a.btn, .action-btn').forEach(btn => {
            btn.addEventListener('click', (e) => {
                e.preventDefault();
                window.top.location.href = '../404.html';
            });
        });
    });
</script>
</body>
</html>
