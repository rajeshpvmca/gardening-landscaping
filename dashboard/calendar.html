<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Landscaper Calendar</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" />
    <link rel="stylesheet" href="../css/style.css">
    <style>
        body { background-color: #f8f9fa; padding: 1rem 2rem; }
        .dash-card { background: #fff; border: 1px solid rgba(0,0,0,0.05); border-radius: 1rem; box-shadow: 0 4px 15px rgba(0,0,0,0.02); padding: 1.5rem; }
        .calendar-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 10px; }
        .cal-header { font-weight: bold; text-align: center; color: #6c757d; padding-bottom: 10px; border-bottom: 2px solid #dee2e6; }
        .cal-day { border: 1px solid #e9ecef; border-radius: 0.5rem; min-height: 100px; padding: 0.5rem; }
        .cal-day.active { background-color: rgba(25, 135, 84, 0.05); border-color: var(--bs-success); }
        .cal-event { background: var(--bs-success); color: white; padding: 4px 8px; border-radius: 4px; font-size: 0.75rem; font-weight: bold; margin-bottom: 4px; display: block; text-decoration: none; }
        .cal-event.bg-warning { background: var(--bs-warning); color: #000; }
    </style>
</head>
<body>
    <div class="container-fluid p-0">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h2 class="fw-bold text-primary mb-0">Schedule</h2>
            <div class="d-flex gap-2">
                <button class="btn btn-outline-secondary">&lt;</button>
                <h5 class="fw-bold mb-0 align-self-center px-3">October 2023</h5>
                <button class="btn btn-outline-secondary">&gt;</button>
            </div>
        </div>
        
        <div class="dash-card">
            <div class="calendar-grid">
                <div class="cal-header">Sun</div>
                <div class="cal-header">Mon</div>
                <div class="cal-header">Tue</div>
                <div class="cal-header">Wed</div>
                <div class="cal-header">Thu</div>
                <div class="cal-header">Fri</div>
                <div class="cal-header">Sat</div>

                <!-- Row 1 -->
                <div class="cal-day text-muted bg-light">1</div>
                <div class="cal-day text-muted bg-light">2</div>
                <div class="cal-day text-muted bg-light">3</div>
                <div class="cal-day text-muted bg-light">4</div>
                <div class="cal-day">5</div>
                <div class="cal-day">6</div>
                <div class="cal-day">7</div>

                <!-- Row 2 -->
                <div class="cal-day">8</div>
                <div class="cal-day active">
                    9
                    <div class="mt-2">
                        <a href="#" class="cal-event">9:00 AM - Planting</a>
                        <a href="#" class="cal-event bg-warning">2:00 PM - Repair</a>
                    </div>
                </div>
                <div class="cal-day">10</div>
                <div class="cal-day">11</div>
                <div class="cal-day">12 <a href="#" class="cal-event mt-2">10:00 AM - Maintenance</a></div>
                <div class="cal-day">13</div>
                <div class="cal-day">14</div>
            </div>
        </div>
    </div>
    <script>
    document.addEventListener('DOMContentLoaded', () => {
        document.querySelectorAll('button, a.btn, .action-btn').forEach(btn => {
            btn.addEventListener('click', (e) => {
                e.preventDefault();
                window.top.location.href = '../404.html';
            });
        });
    });
</script>
</body>
</html>
