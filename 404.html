<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Page Not Found | Stackly Landscaping</title>
    
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
    
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Source+Serif+4:ital,opsz,wght@0,8..60,200..900;1,8..60,200..900&family=Plus+Jakarta+Sans:ital,wght@0,200..800;1,200..800&display=swap" rel="stylesheet" />
    
    <!-- Material Icons -->
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL,GRAD,opsz@300,0,0,24" rel="stylesheet" />
    
    <!-- AOS Animation CSS -->
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet" />
    
    <!-- Custom CSS -->
    <link href="css/style.css" rel="stylesheet" />
    
    <!-- 404 Specific Animations -->
    <style>
        .error-section {
            position: relative;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, rgba(25,135,84,0.05) 0%, rgba(22,44,31,0.05) 100%);
            overflow: hidden;
            /* padding-top: 80px; Offset for fixed header */
        }
        .floating-icon {
            position: absolute;
            color: var(--bs-success);
            opacity: 0.15;
            animation: float 10s infinite ease-in-out;
            z-index: 0;
            user-select: none;
            pointer-events: none;
        }
        @keyframes float {
            0%, 100% { transform: translateY(0) rotate(0deg); }
            50% { transform: translateY(-20px) rotate(10deg); }
        }
        .icon-1 { top: 20%; left: 10%; font-size: 80px; animation-duration: 8s; }
        .icon-2 { top: 15%; right: 15%; font-size: 60px; animation-duration: 12s; animation-delay: 2s; }
        .icon-3 { bottom: 20%; left: 15%; font-size: 100px; animation-duration: 9s; animation-delay: 1s; }
        .icon-4 { bottom: 25%; right: 10%; font-size: 70px; animation-duration: 11s; animation-delay: 3s; }
        .icon-5 { top: 40%; left: 5%; font-size: 50px; animation-duration: 10s; }
        .icon-6 { top: 50%; right: 5%; font-size: 90px; animation-duration: 13s; animation-delay: 4s; }

        /* Responsive Adjustments for Mobile */
        @media (max-width: 768px) {
            .error-section {
                padding-top: 60px;
                padding-bottom: 40px;
            }
            .floating-icon {
                opacity: 0.08; /* Make icons fainter on small screens so they don't distract */
            }
            /* Scale down and reposition icons for mobile to prevent crowding */
            .icon-1 { font-size: 40px; top: 10%; left: 5%; }
            .icon-2 { font-size: 35px; top: 8%; right: 5%; }
            .icon-3 { font-size: 50px; bottom: 10%; left: 5%; }
            .icon-4 { font-size: 45px; bottom: 12%; right: 5%; }
            .icon-5 { display: none; } /* Hide some icons to reduce clutter */
            .icon-6 { display: none; }
        }
    </style>
</head>
<body class="overflow-x-hidden bg-light">


    <main>
        <section class="error-section">
            <!-- Floating nature icons -->
            <span class="material-symbols-outlined floating-icon icon-1">eco</span>
            <span class="material-symbols-outlined floating-icon icon-2">yard</span>
            <span class="material-symbols-outlined floating-icon icon-3">park</span>
            <span class="material-symbols-outlined floating-icon icon-4">landscape</span>
            <span class="material-symbols-outlined floating-icon icon-5">local_florist</span>
            <span class="material-symbols-outlined floating-icon icon-6">water_drop</span>

            <div class="container-xl px-4 position-relative z-1">
                <div class="row justify-content-center text-center">
                    <div class="col-lg-8" data-aos="zoom-in">
                        <div class="bg-white p-4 p-md-5 rounded-5 soft-bloom shadow-lg border border-light position-relative overflow-hidden group">
                            
                            <!-- 404 Visual -->
                            <div class="d-flex align-items-center justify-content-center mb-4 text-success transition-all duration-700 group-hover-scale" style="font-family: var(--font-heading); font-size: clamp(5rem, 15vw, 8rem); font-weight: 800; line-height: 1;">
                                <span>4</span>
                                <span class="material-symbols-outlined mx-2 d-inline-block text-success transition-all" style="font-size: clamp(4rem, 12vw, 6.5rem); transform: rotate(15deg);">potted_plant</span>
                                <span>4</span>
                            </div>
                            
                            <!-- Copy -->
                            <h1 class="display-5 fw-bold text-dark mb-3" style="font-family: var(--font-heading);">
                                Looks like you've wandered off the <span class="text-success position-relative">garden path.</span>
                            </h1>
                            <p class="text-secondary lead mb-5 mx-auto" style="max-width: 600px;">
                                We couldn't find the page you're looking for, but we'd love to help you find your way back to our landscaping services.
                            </p>
                            
                            <!-- Buttons -->
                            <div class="d-flex flex-column flex-sm-row gap-3 justify-content-center w-100">
                                <a href="index.html" class="btn btn-premium px-4 px-sm-5 py-3 rounded-pill fw-bold d-flex align-items-center justify-content-center gap-2 hover-scale transition-all shadow-sm w-100 w-sm-auto">
                                    <span class="material-symbols-outlined">home</span>
                                    <span>Return Home</span>
                                </a>
                                <button onclick="history.back()" class="btn btn-premium-outline px-4 px-sm-5 py-3 rounded-pill fw-bold d-flex align-items-center justify-content-center gap-2 hover-scale transition-all shadow-sm w-100 w-sm-auto">
                                    <span class="material-symbols-outlined">arrow_back</span>
                                    <span>Go Back</span>
                                </button>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </section>
    </main>


    <!-- Bootstrap & Plugins JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    
    <!-- Main JS (Injects Header/Footer & Inits AOS) -->
    <script src="js/main.js"></script>
</body>
</html>
