<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Manage Clients</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" />
    <link rel="stylesheet" href="../css/style.css">
    <style>
        body { background-color: #f8f9fa; padding: 1rem 2rem; }
        .dash-card { background: #fff; border: 1px solid rgba(0,0,0,0.05); border-radius: 1rem; box-shadow: 0 4px 15px rgba(0,0,0,0.02); padding: 1.5rem; }
    </style>
</head>
<body>
    <div class="container-fluid p-0">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h2 class="fw-bold text-primary mb-0">Client Portfolio</h2>
            <div class="d-flex gap-2">
                <input type="text" class="form-control" placeholder="Search clients...">
                <button class="btn btn-premium rounded-pill px-4 fw-bold">+ New Client</button>
            </div>
        </div>
        
        <div class="dash-card">
            <div class="table-responsive">
                <table class="table align-middle table-hover">
                    <thead class="table-light">
                        <tr class="text-uppercase text-secondary small tracking-widest">
                            <th>Client Details</th>
                            <th>Properties</th>
                            <th>Active Plan</th>
                            <th>Total Billed</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr>
                            <td>
                                <h6 class="fw-bold mb-1">Sarah Adams</h6>
                                <p class="text-muted small mb-0">+1 (555) 123-4567</p>
                            </td>
                            <td>450 West End Rd.</td>
                            <td><span class="badge bg-success bg-opacity-10 text-success rounded-pill px-3">Premium Care</span></td>
                            <td class="fw-bold">$12,450.00</td>
                            <td>
                                <button class="btn btn-sm btn-outline-primary rounded-pill">View Profile</button>
                            </td>
                        </tr>
                        <tr>
                            <td>
                                <h6 class="fw-bold mb-1">Oakwood Estate (Corporate)</h6>
                                <p class="text-muted small mb-0">contact@oakwood.com</p>
                            </td>
                            <td>12 Elm St.<br>89 Pine Ave.</td>
                            <td><span class="badge bg-primary bg-opacity-10 text-primary rounded-pill px-3">Enterprise Maintenance</span></td>
                            <td class="fw-bold">$45,000.00</td>
                            <td>
                                <button class="btn btn-sm btn-outline-primary rounded-pill">View Profile</button>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
    <script>
    document.addEventListener('DOMContentLoaded', () => {
        document.querySelectorAll('button, a.btn, .action-btn').forEach(btn => {
            btn.addEventListener('click', (e) => {
                e.preventDefault();
                window.top.location.href = '../404.html';
            });
        });
    });
</script>
</body>
</html>
