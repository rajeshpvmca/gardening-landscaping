<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Landscaper Inventory</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" />
    <link rel="stylesheet" href="../css/style.css">
    <style>
        body { background-color: #f8f9fa; padding: 1rem 2rem; }
        .dash-card { background: #fff; border: 1px solid rgba(0,0,0,0.05); border-radius: 1rem; box-shadow: 0 4px 15px rgba(0,0,0,0.02); padding: 1.5rem; }
    </style>
</head>
<body>
    <div class="container-fluid p-0">
        <h2 class="fw-bold text-primary mb-4">Equipment & Material Check-out</h2>
        
        <div class="dash-card">
            <div class="d-flex justify-content-between align-items-center mb-4">
                <h5 class="fw-bold mb-0">My Checked Out Items</h5>
                <button class="btn btn-premium-outline rounded-pill px-4 fw-bold">Scan QR to Checkout</button>
            </div>
            
            <div class="table-responsive">
                <table class="table align-middle">
                    <thead class="table-light">
                        <tr>
                            <th>Item Name</th>
                            <th>ID Code</th>
                            <th>Checkout Date</th>
                            <th>Status</th>
                            <th>Action</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr>
                            <td class="fw-bold"><span class="material-symbols-outlined align-middle me-2 text-secondary">handyman</span> Husqvarna Chainsaw</td>
                            <td class="text-secondary">EQ-492</td>
                            <td>Today, 8:00 AM</td>
                            <td><span class="badge bg-primary bg-opacity-10 text-primary px-3 rounded-pill">In Field</span></td>
                            <td><button class="btn btn-sm btn-outline-success fw-bold rounded-pill">Return Item</button></td>
                        </tr>
                        <tr>
                            <td class="fw-bold"><span class="material-symbols-outlined align-middle me-2 text-secondary">agriculture</span> Honda Riding Mower</td>
                            <td class="text-secondary">EQ-112</td>
                            <td>Yesterday, 9:00 AM</td>
                            <td><span class="badge bg-warning bg-opacity-10 text-warning px-3 rounded-pill">Needs Maintenance</span></td>
                            <td><button class="btn btn-sm btn-outline-danger fw-bold rounded-pill">Report Issue</button></td>
                        </tr>
                        <tr>
                            <td class="fw-bold"><span class="material-symbols-outlined align-middle me-2 text-secondary">forest</span> Organic Mulch Bags (10)</td>
                            <td class="text-secondary">MAT-89</td>
                            <td>Today, 8:00 AM</td>
                            <td><span class="badge bg-secondary bg-opacity-10 text-secondary px-3 rounded-pill">Consumed</span></td>
                            <td><button class="btn btn-sm btn-outline-secondary fw-bold rounded-pill" disabled>Logged</button></td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
    <script>
    document.addEventListener('DOMContentLoaded', () => {
        document.querySelectorAll('button, a.btn, .action-btn').forEach(btn => {
            btn.addEventListener('click', (e) => {
                e.preventDefault();
                window.top.location.href = '../404.html';
            });
        });
    });
</script>
</body>
</html>
